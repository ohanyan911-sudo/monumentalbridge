<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>60-ական Լոգո</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: transparent;
            overflow: hidden;
        }
        
        .logo-wrapper {
            width: 350px;
            height: 350px;
            transform: scale(0.5);
            transform-origin: top left;
        }
        
        .logo-container {
            position: relative;
            width: 300px;
            height: 300px;
            animation: precession 60s linear infinite;
        }
        
        @keyframes precession {
            0%   { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .dot {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            top: 50%;
            left: 50%;
        }
        
        .dot.c1 { background-color: #fa9f00; }
        .dot.c2 { background-color: #ff00fc; }
        .dot.c3 { background-color: #12ff00; }
        .dot.c4 { background-color: #ff1e00; }
        .dot.c5 { background-color: #000000; }
    </style>
</head>
<body>
    <div class="logo-wrapper">
        <div class="logo-container" id="logo"></div>
    </div>
    
    <script>
        const container = document.getElementById('logo');
        const totalDots = 60;
        const radius = 135;
        const centerX = 150;
        const centerY = 150;
        
        for (let i = 1; i <= totalDots; i++) {
            let colorClass = '';
            
            if (i <= 39) {
                colorClass = 'c1';
            } else if (i <= 51) {
                colorClass = 'c2';
            } else if (i <= 58) {
                colorClass = 'c3';
            } else if (i === 59) {
                colorClass = 'c4';
            } else if (i === 60) {
                colorClass = 'c5';
            }
            
            const angle = (i / totalDots) * 2 * Math.PI - Math.PI / 2;
            const x = centerX + radius * Math.cos(angle);
            const y = centerY + radius * Math.sin(angle);
            
            const dot = document.createElement('div');
            dot.className = 'dot ' + colorClass;
            dot.style.transform = `translate(${x - centerX}px, ${y - centerY}px)`;
            container.appendChild(dot);
        }
    </script>
</body>
</html>
